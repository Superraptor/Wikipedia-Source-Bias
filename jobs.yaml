# Toolforge job definitions.  Apply with:  toolforge jobs load jobs.yaml
#
# `command:` values are Procfile process names -- the build service prepends
# `launcher` automatically, which is what puts the installed venv on PATH.
# Composite shell commands would need wrapping in `sh -c '...'`.
#
# Build-service images have file logging disabled, so read output with
# `toolforge jobs logs <name> -f` rather than looking for .out/.err on NFS.
---
# The only process that performs an analysis. The web tier just enqueues.
- name: worker
  image: tool-wikibias-analyzer/tool-wikibias-analyzer:latest
  command: worker
  continuous: true
  # Replicas parallelise ACROSS articles; WSB_SOURCE_CONCURRENCY parallelises
  # within one, which is what actually helps a single large article. Two rather
  # than three: idle workers were measured at ~21Mi, so a third was reserving
  # 1Gi of quota to do nothing. claim_next() guards on status='pending', so
  # parallel workers never collide.
  replicas: 2
  # Kept at 1Gi despite idling at ~21Mi. This is the one place headroom is
  # genuinely needed: a large article holds every source profile in memory and
  # the checkpoint serialises the whole growing result, and a worker running at
  # WSB_SOURCE_CONCURRENCY=6 was measured at 502Mi. 512Mi would sit on the edge
  # of an OOM kill.
  mem: 1Gi
  # I/O-bound -- almost all of the time is spent waiting on external APIs, so
  # a full reserved core was waste.
  cpu: "0.5"
  emails: onfailure

# Re-queues any corpus article missing from the cache. Cheap when warm: it
# skips anything already cached and returns in milliseconds.
- name: refresh-corpus
  image: tool-wikibias-analyzer/tool-wikibias-analyzer:latest
  command: populate
  schedule: "@weekly"
  mem: 512Mi
  emails: onfailure
